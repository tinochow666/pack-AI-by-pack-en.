plugins {
    id 'java'
    id 'application'
    id 'org.openjfx.javafxplugin' version '0.1.0'
}

group = 'com.phiigrame'
version = '1.0.0'

ext {
    javafxVersion = '21.0.1'
    controlsfxVersion = '11.2.1'
    richtextfxVersion = '0.11.1'
}

javafx {
    version = javafxVersion
    modules = ['javafx.controls', 'javafx.fxml', 'javafx.graphics', 'javafx.web']
}

dependencies {
    // JavaFX
    implementation "org.openjfx:javafx-controls:$javafxVersion"
    implementation "org.openjfx:javafx-fxml:$javafxVersion"
    
    // ControlsFX for additional UI components
    implementation "org.controlsfx:controlsfx:$controlsfxVersion"
    
    // RichTextFX for code editing
    implementation "org.fxmisc.richtext:richtextfx:$richtextfxVersion"
    
    // Spring Boot (optional, for backend features)
    implementation 'org.springframework.boot:spring-boot-starter:3.2.0'
    
    // JSON processing
    implementation 'com.google.code.gson:gson:2.10.1'

    // SQLite (local user DB, recents, sessions, model configs)
    implementation 'org.xerial:sqlite-jdbc:3.45.3.0'
    
    // llama.cpp Java bindings (pure native, no Python needed)
    // Bundles libJLlama.dll / libJLlama.so for offline inference.
    implementation 'de.kherud:llama:3.0.0'
    
    // Logging
    implementation 'ch.qos.logback:logback-classic:1.4.11'
    
    // Testing
    testImplementation 'org.junit.jupiter:junit-jupiter:5.10.1'
}

application {
    mainClass = 'com.phiigrame.PhiigrameApp'
}

java {
    sourceCompatibility = JavaVersion.VERSION_17
    targetCompatibility = JavaVersion.VERSION_17
}

tasks.named('test') {
    useJUnitPlatform()
}

// ---------------------------------------------------------------------------
//  jpackage tasks - turn the project into a Windows .exe / .msi
// ---------------------------------------------------------------------------
//
//  Builds a fat jar with all runtime dependencies, then feeds it to
//  JDK's jpackage tool which produces:
//      - dist/PhiigrameIDE/          (app-image, portable folder with .exe)
//      - dist/PhiigrameIDE-1.0.0.msi (Windows installer)
//
//  Run with:   gradle jpackageExe        (app-image)
//              gradle jpackageMsi        (installer)
//              gradle jpackage           (both)
// ---------------------------------------------------------------------------

// 1. Copy every runtime dependency to build/libs/lib/ so jpackage can
//    ship them in the app-image next to the main jar.
task copyDependencies(type: Copy) {
    from configurations.runtimeClasspath
    into 'build/libs/lib'
}
jar.dependsOn copyDependencies

// 2. Add a Class-Path manifest entry to the main jar so it can find
//    every dependency in the bundled lib/ folder.
jar {
    manifest {
        attributes(
            'Main-Class': 'com.phiigrame.PhiigrameApp',
            'Class-Path': fileTree('build/libs/lib')
                    .files
                    .collect { 'lib/' + it.name }
                    .join(' ')
        )
    }
}

// 3. Resolve jpackage.exe from JAVA_HOME
def jpackageExe = "${System.getProperty('java.home')}\\bin\\jpackage.exe"

// 4. Build the application image (portable folder with PhiigrameIDE.exe)
tasks.register('jpackageExe', Exec) {
    dependsOn 'build'
    description = 'Build a Windows app-image containing PhiigrameIDE.exe'
    workingDir projectDir
    def iconPath = 'src/main/resources/icons/phiigrame.ico'
    def iconExists = new File(iconPath).exists()
    doFirst {
        // Clean up any previous app-image so jpackage does not fail on existing dest
        def appImage = new File(projectDir, 'dist/PhiigrameIDE')
        if (appImage.exists()) {
            appImage.deleteDir()
        }
    }
    def cmd = [
        jpackageExe,
        '--type', 'app-image',
        '--input', 'build/libs',
        '--dest', 'dist',
        '--name', 'PhiigrameIDE',
        '--main-class', 'com.phiigrame.PhiigrameApp',
        '--main-jar', "phiigrame-${version}.jar",
        '--app-version', version,
        '--vendor', 'Phiigrame',
        '--description', 'Phiigrame IDE with built-in local AI (Qwen2.5-Coder)',
        // Bundle JavaFX as modules so they are usable from the runtime
        '--module-path', 'build/libs/lib',
        '--add-modules', 'javafx.controls,javafx.fxml,javafx.graphics,javafx.web,javafx.media,java.sql',
        '--java-options', '-Xms128m',
        '--java-options', '-Xmx4g',
        '--java-options', '-Dfile.encoding=UTF-8',
        '--java-options', '-Dprism.order=sw'
    ]
    if (iconExists) cmd.addAll(['--icon', iconPath])
    commandLine cmd
    ignoreExitValue = false
}

// 5. Build a Windows MSI installer
tasks.register('jpackageMsi', Exec) {
    dependsOn 'build'
    description = 'Build a Windows MSI installer for Phiigrame IDE'
    workingDir projectDir
    def iconPath = 'src/main/resources/icons/phiigrame.ico'
    def iconExists = new File(iconPath).exists()
    def cmd = [
        jpackageExe,
        '--type', 'msi',
        '--input', 'build/libs',
        '--dest', 'dist',
        '--name', 'PhiigrameIDE',
        '--main-class', 'com.phiigrame.PhiigrameApp',
        '--main-jar', "phiigrame-${version}.jar",
        '--app-version', version,
        '--vendor', 'Phiigrame',
        '--description', 'Phiigrame IDE with built-in local AI (Qwen2.5-Coder)',
        '--win-dir-chooser',
        '--win-menu',
        '--win-shortcut',
        '--win-menu-group', 'Phiigrame',
        '--add-modules', 'java.sql',
        '--java-options', '-Xms128m',
        '--java-options', '-Xmx4g',
        '--java-options', '-Dfile.encoding=UTF-8'
    ]
    if (iconExists) cmd.addAll(['--icon', iconPath])
    commandLine cmd
    ignoreExitValue = false
}

// 6. Run both at once
tasks.register('jpackage') {
    dependsOn 'jpackageExe', 'jpackageMsi'
    description = 'Build the Windows app-image and MSI installer'
}

// 7. Copy ai_server.py and the model bootstrap script (kept for any
//    user who still wants to run them outside the IDE).
task copyAiServer(type: Copy) {
    from 'ai_server.py'
    into 'build/libs'
}
afterEvaluate {
    tasks.named('jar').configure { dependsOn copyAiServer }
}

// ---------------------------------------------------------------------------
//  itch.io distribution zip
// ---------------------------------------------------------------------------
//  itch.io expects a single file upload.  We package the Windows app-image
//  (a folder containing PhiigrameIDE.exe plus the bundled JDK + JavaFX
//  runtime) along with a short README so a user can just download, unzip,
//  and run.
//
//  Output:   dist/PhiigrameIDE-itch-<version>.zip
//  Run with: gradle itchZip
// ---------------------------------------------------------------------------
tasks.register('itchZip', Zip) {
    dependsOn 'jpackageExe'
    group = 'distribution'
    description = 'Build a zip suitable for uploading to itch.io'
    archiveBaseName = 'PhiigrameIDE-itch'
    archiveVersion  = version
    archiveExtension = 'zip'
    destinationDirectory = file('dist')

    // Resolve the freshly-built app-image at execution time so a clean
    // build doesn't have to know its folder name in advance.
    from({ project.fileTree('dist/PhiigrameIDE').dir }) {
        into 'PhiigrameIDE'
    }
    from('ITCH_README.md') {
        into 'PhiigrameIDE'
    }
}

// Always rebuild the README on demand so documentation tweaks are not
// silently lost between builds.
tasks.register('genItchReadme', WriteTask) {
    outputFile = file('ITCH_README.md')
    content = '''# Phiigrame IDE — itch.io build

Thank you for downloading **Phiigrame IDE 1.0.0**, an AI-augmented
desktop IDE for Kotlin, Java, and Groovy with a built-in local LLM
(Qwen2.5-Coder 1.5B).  This build is a portable app-image - no
installer, no admin rights required.

## How to run (Windows)

1. Unzip `PhiigrameIDE-itch-1.0.0.zip` anywhere you have write
   access (Desktop, `D:\\\\Games`, etc.).
2. Open the extracted `PhiigrameIDE` folder.
3. Double-click **`PhiigrameIDE.exe`**.

The first launch may take 10-20 seconds while the JVM starts.  When
the login dialog appears, choose **Create Account** or close the
dialog to continue as a guest (the guest account still has full AI
access, but chat history is local-only).

> If SmartScreen blocks the binary, click "More info" → "Run anyway".
> Phiigrame is unsigned while we are in early access.

## What is included

| File / folder           | Purpose                                  |
| ----------------------- | ---------------------------------------- |
| `PhiigrameIDE.exe`      | The launcher (bundles a private JDK 17). |
| `app/PhiigrameIDE.cfg`  | Runtime config (memory, jvm args).       |
| `runtime/`              | Bundled JRE 17 - nothing to install.     |
| `lib/`                  | Phiigrame jars + dependencies.           |

## Quick tour

* **File -> New Project** - scaffold a new project.
* **File -> Open** or **File -> Recent Projects** - reopen a folder.
  The **Welcome** tab shows your most recently used projects; right
  click a row to open it in Explorer or remove it from the list.
* **AI** sidebar tab - chat with the local Qwen2.5-Coder model.  All
  inference happens on your machine; no data leaves your computer.
* **Plugins** -> **Phiigrame AI Assistant** - swap the local model
  for a remote OpenAI-compatible endpoint (DeepSeek, Qwen, OpenAI
  itself, anything with `/chat/completions`).

## System requirements

* Windows 10 64-bit or newer (build 17763+).
* ~1.5 GB free disk space (the bundled JRE alone is ~250 MB).
* 4 GB RAM minimum; 8 GB recommended for the AI.
* No Python, no Ollama, no Docker.

## Source and updates

* Source code: https://github.com/tinochow666/pack-AI-by-pack-en
* Bug reports: open an issue on the GitHub repository.
* License: MIT.

Made with care.  Happy hacking!
'''
}

// A tiny helper task type so we can generate the README from the
// build script without an external template.
class WriteTask extends org.gradle.api.DefaultTask {
    @org.gradle.api.tasks.Input String content
    @org.gradle.api.tasks.OutputFile java.io.File outputFile
    @org.gradle.api.tasks.TaskAction void write() {
        outputFile.parentFile.mkdirs()
        outputFile.text = content
    }
}
tasks.named('itchZip').configure { dependsOn 'genItchReadme' }
